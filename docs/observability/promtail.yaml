server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/promtail-pawprint-positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: pawprint
    static_configs:
      - targets:
          - localhost
        labels:
          job: pawprint
          __path__: /tmp/pawprint-logs/**/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            component: component
            logger: logger
            message: message
            run_id: run_id
            user_run_id: user_run_id
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          component:
      - structured_metadata:
          logger:
          run_id:
          user_run_id:
